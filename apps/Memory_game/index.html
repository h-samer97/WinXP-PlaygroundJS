			</div>
	</div>


	<div class="button">
		<span>Start Game</span>
	</div>

	<div class="info-container">

		<div class="tries">
			Wrong tries: <span class="count"></span>
		</div>
		<div class="score">
			Your Score: <span>0</span>
		</div>
		<div class="date-time" id="data-time">
		</div>
		<div class="timer-con">
			<i class="fa fa-clock"></i><span class="timer"></span>
		</div>
		<div class="settings">
			<i class="fa fa-cog"></i>
			<div class="settings-container">
				<div class="color">
					<span>Blocks Color</span>
					<input type="color" id="color">
				</div>
				<div class="timer-game">
					<span>Timer</span>
					<input type="number" id="timer-number">

					<span>Tries Count</span>
					<input type="number" id="tries-number">
				</div>
					<input type="button" value="Save" class="save-data">
				</div>
				

			</div>
		</div>
	</div>
